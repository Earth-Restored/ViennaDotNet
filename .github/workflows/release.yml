name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - os: win
            arch: x64
          - os: win
            arch: arm64
          - os: linux
            arch: x64
          - os: linux
            arch: arm64
          - os: osx
            arch: x64
          - os: osx
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        shell: pwsh
        run: |
          ./publish.ps1 -profiles framework-dependent-${{ matrix.os }}-${{ matrix.arch }}

      - name: Force EULA accept
        shell: pwsh
        run: |
          $eulaPath = "build/Release/framework-dependent-${{ matrix.os }}-${{ matrix.arch }}/staticdata/server_template_dir/eula.txt"
          New-Item -ItemType Directory -Force -Path (Split-Path $eulaPath) | Out-Null
          "eula=true" | Set-Content -Path $eulaPath -Encoding ASCII

      - name: Download resource pack
        shell: pwsh
        run: |
          $file = "build/Release/framework-dependent-${{ matrix.os }}-${{ matrix.arch }}/staticdata/resourcepacks/vanilla.zip"
          Invoke-WebRequest `
            -Uri "https://web.archive.org/web/20210624200250if_/https://cdn.mceserv.net/availableresourcepack/resourcepacks/dba38e59-091a-4826-b76a-a08d7de5a9e2-1301b0c257a311678123b9e7325d0d6c61db3c35" `
            -OutFile $file

      - name: Zip build
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "build/Release/framework-dependent-${{ matrix.os }}-${{ matrix.arch }}/*" `
            -DestinationPath "ViennaDotNet-${{ matrix.os }}-${{ matrix.arch }}.zip"

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: ViennaDotNet-${{ matrix.os }}-${{ matrix.arch }}.zip    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_files

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release_files/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
